services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "if [ \"$APP_RELOAD\" = \"1\" ]; then
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload;
      else
      uvicorn app.main:app --host 0.0.0.0 --port 8000;
      fi"
    env_file:
      - .env
    ports:
      - "${APP_HOST_PORT:-8000}:8000"
    volumes:
      - .:/workspace
    depends_on:
      - db
      - redis
      - overpass

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m dramatiq --processes ${WORKER_PROCESSES:-1} --threads ${WORKER_THREADS:-1} app.tasks
    env_file:
      - .env
    volumes:
      - .:/workspace
    depends_on:
      - db
      - redis
      - overpass

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"

  overpass:
    image: wiktorn/overpass-api:0.7.62
    environment:
      OVERPASS_META: "no"
      OVERPASS_MODE: ${OVERPASS_MODE:-init}
      OVERPASS_PLANET_URL: ${OVERPASS_PLANET_URL}
      OVERPASS_DIFF_URL: ${OVERPASS_DIFF_URL}
      OVERPASS_PLANET_PREPROCESS: ${OVERPASS_PLANET_PREPROCESS:-}
      OVERPASS_RULES_LOAD: ${OVERPASS_RULES_LOAD:-10}
      OVERPASS_UPDATE_SLEEP: ${OVERPASS_UPDATE_SLEEP:-3600}
    ports:
      - "${OVERPASS_HOST_PORT:-12346}:80"
    volumes:
      - overpassdb:/db
    restart: unless-stopped

volumes:
  pgdata:
  overpassdb:
