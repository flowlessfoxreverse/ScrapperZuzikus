services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "if [ \"$$APP_RELOAD\" = \"1\" ]; then
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload;
      else
      uvicorn app.main:app --host 0.0.0.0 --port 8000;
      fi"
    env_file:
      - .env
    ports:
      - "${APP_HOST_PORT:-8000}:8000"
    volumes:
      - .:/workspace
      - overpassdb:/overpassdb:ro
    depends_on:
      - db
      - redis
      - overpass
    networks:
      - scrapper_net

  discovery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m dramatiq --processes ${WORKER_PROCESSES:-1} --threads ${WORKER_THREADS:-1} app.tasks:redis_broker app.tasks --queues discovery maintenance
    env_file:
      - .env
    volumes:
      - .:/workspace
    depends_on:
      - db
      - redis
      - overpass
    networks:
      - scrapper_net

  crawl_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m dramatiq --processes ${CRAWL_WORKER_PROCESSES:-1} --threads ${CRAWL_WORKER_THREADS:-1} app.tasks:redis_broker app.tasks --queues crawl
    env_file:
      - .env
    volumes:
      - .:/workspace
    depends_on:
      - db
      - redis
      - overpass
    networks:
      - scrapper_net

  browser_worker:
    build:
      context: .
      dockerfile: Dockerfile.browser
    command: python -m dramatiq --processes ${BROWSER_WORKER_PROCESSES:-1} --threads ${BROWSER_WORKER_THREADS:-1} app.tasks:redis_broker app.tasks --queues browser
    env_file:
      - .env
    volumes:
      - .:/workspace
    depends_on:
      - db
      - redis
      - overpass
    networks:
      - scrapper_net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - scrapper_net

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    networks:
      - scrapper_net

  overpass:
    image: wiktorn/overpass-api:0.7.62
    hostname: overpass
    entrypoint:
      - /bin/sh
      - /usr/local/bin/overpass-entrypoint.sh
    command:
      - /app/docker-entrypoint.sh
    environment:
      OVERPASS_META: "no"
      OVERPASS_MODE: ${OVERPASS_MODE:-init}
      OVERPASS_PLANET_URL: ${OVERPASS_PLANET_URL}
      OVERPASS_DIFF_URL: ${OVERPASS_DIFF_URL}
      OVERPASS_PLANET_PREPROCESS: ${OVERPASS_PLANET_PREPROCESS:-}
      OVERPASS_RULES_LOAD: ${OVERPASS_RULES_LOAD:-10}
      OVERPASS_UPDATE_SLEEP: ${OVERPASS_UPDATE_SLEEP:-3600}
    ports:
      - "${OVERPASS_HOST_PORT:-12346}:80"
    volumes:
      - overpassdb:/db
      - ./ops/overpass-entrypoint.sh:/usr/local/bin/overpass-entrypoint.sh:ro
    restart: unless-stopped
    networks:
      scrapper_net:
        ipv4_address: 172.30.0.10
        aliases:
          - overpass

volumes:
  pgdata:
  overpassdb:

networks:
  scrapper_net:
    ipam:
      config:
        - subnet: 172.30.0.0/24
