services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      sh -c "if [ \"$$APP_RELOAD\" = \"1\" ]; then
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload;
      else
      uvicorn app.main:app --host 0.0.0.0 --port 8000;
      fi"
    env_file:
      - .env
    ports:
      - "${APP_HOST_PORT:-8000}:8000"
    volumes:
      - .:/workspace
      - overpassdb:/overpassdb:ro
    depends_on:
      - db
      - redis
      - overpass
    networks:
      - scrapper_net

  discovery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m dramatiq --processes ${WORKER_PROCESSES:-1} --threads ${WORKER_THREADS:-1} app.tasks:redis_broker app.tasks --queues discovery maintenance
    env_file:
      - .env
    volumes:
      - .:/workspace
    depends_on:
      - db
      - redis
      - overpass
    networks:
      - scrapper_net

  crawl_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m dramatiq --processes ${CRAWL_WORKER_PROCESSES:-1} --threads ${CRAWL_WORKER_THREADS:-1} app.tasks:redis_broker app.tasks --queues crawl
    env_file:
      - .env
    volumes:
      - .:/workspace
    depends_on:
      - db
      - redis
      - overpass
    networks:
      - scrapper_net

  retry_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m dramatiq --processes ${RETRY_WORKER_PROCESSES:-1} --threads ${RETRY_WORKER_THREADS:-1} app.tasks:redis_broker app.tasks --queues retry
    env_file:
      - .env
    volumes:
      - .:/workspace
    depends_on:
      - db
      - redis
      - overpass
    networks:
      - scrapper_net

  browser_worker:
    build:
      context: .
      dockerfile: Dockerfile.browser
    command: python -m dramatiq --processes ${BROWSER_WORKER_PROCESSES:-1} --threads ${BROWSER_WORKER_THREADS:-64} app.tasks:redis_broker app.tasks --queues browser
    env_file:
      - .env
    volumes:
      - .:/workspace
    depends_on:
      - db
      - redis
      - overpass
    networks:
      - scrapper_net

  email_validation_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m dramatiq --processes 1 --threads 4 app.tasks:redis_broker app.tasks --queues email_validation
    env_file:
      - .env
    volumes:
      - .:/workspace
    depends_on:
      - db
      - redis
    networks:
      - scrapper_net

  emailval_api:
    build:
      context: ./emailvalidator/emailvalidator
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://emailval:${EMAILVAL_DB_PASSWORD:-emailval}@emailval_db:5432/emailval
      REDIS_URL: redis://emailval_redis:6379/0
      CELERY_BROKER_URL: redis://emailval_redis:6379/1
      SMTP_HELO_HOSTNAME: ${EMAILVAL_SMTP_HELO_HOSTNAME:-mail.validator.example.com}
      SMTP_FROM_ADDRESS: ${EMAILVAL_SMTP_FROM_ADDRESS:-probe@validator.example.com}
      DEBUG: ${EMAILVAL_DEBUG:-false}
    ports:
      - "${EMAILVAL_HOST_PORT:-8002}:8000"
    depends_on:
      emailval_db:
        condition: service_healthy
      emailval_redis:
        condition: service_healthy
    networks:
      - scrapper_net
    restart: unless-stopped

  emailval_worker:
    build:
      context: ./emailvalidator/emailvalidator
      dockerfile: docker/Dockerfile
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=${EMAILVAL_WORKER_CONCURRENCY:-4} --queues validation,retry
    environment:
      DATABASE_URL: postgresql+asyncpg://emailval:${EMAILVAL_DB_PASSWORD:-emailval}@emailval_db:5432/emailval
      REDIS_URL: redis://emailval_redis:6379/0
      CELERY_BROKER_URL: redis://emailval_redis:6379/1
      SMTP_HELO_HOSTNAME: ${EMAILVAL_SMTP_HELO_HOSTNAME:-mail.validator.example.com}
      SMTP_FROM_ADDRESS: ${EMAILVAL_SMTP_FROM_ADDRESS:-probe@validator.example.com}
    depends_on:
      emailval_db:
        condition: service_healthy
      emailval_redis:
        condition: service_healthy
    networks:
      - scrapper_net
    restart: unless-stopped

  emailval_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: emailval
      POSTGRES_PASSWORD: ${EMAILVAL_DB_PASSWORD:-emailval}
      POSTGRES_DB: emailval
    volumes:
      - emailval_pgdata:/var/lib/postgresql/data
    networks:
      - scrapper_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailval"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  emailval_redis:
    image: redis:7-alpine
    volumes:
      - emailval_redis_data:/data
    networks:
      - scrapper_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - scrapper_net

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    networks:
      - scrapper_net

  overpass:
    image: wiktorn/overpass-api:0.7.62
    hostname: overpass
    entrypoint:
      - /bin/sh
      - /usr/local/bin/overpass-entrypoint.sh
    command:
      - /app/docker-entrypoint.sh
    environment:
      OVERPASS_META: "no"
      OVERPASS_MODE: ${OVERPASS_MODE:-init}
      OVERPASS_PLANET_URL: ${OVERPASS_PLANET_URL}
      OVERPASS_DIFF_URL: ${OVERPASS_DIFF_URL}
      OVERPASS_PLANET_PREPROCESS: ${OVERPASS_PLANET_PREPROCESS:-}
      OVERPASS_RULES_LOAD: ${OVERPASS_RULES_LOAD:-10}
      OVERPASS_UPDATE_SLEEP: ${OVERPASS_UPDATE_SLEEP:-3600}
    ports:
      - "${OVERPASS_HOST_PORT:-12346}:80"
    volumes:
      - overpassdb:/db
      - ./ops/overpass-entrypoint.sh:/usr/local/bin/overpass-entrypoint.sh:ro
    restart: unless-stopped
    networks:
      scrapper_net:
        ipv4_address: 172.30.0.10
        aliases:
          - overpass

volumes:
  pgdata:
  overpassdb:
  emailval_pgdata:
  emailval_redis_data:

networks:
  scrapper_net:
    ipam:
      config:
        - subnet: 172.30.0.0/24
